apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: authz-root-default-deny
  namespace: istio-system
spec:
  selector:
    matchLabels:
      authz-case: root-local
---
apiVersion: v1
kind: Namespace
metadata:
  name: omg-authz-root-local
  labels:
    istio-injection: enabled
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-client
  namespace: omg-authz-root-local
spec:
  selector:
    matchLabels:
      app: authz-root-local
  rules:
    - from:
        - source:
            principals: ["cluster.local/ns/client/sa/client"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authz-root-local
  namespace: omg-authz-root-local
spec:
  replicas: 1
  selector:
    matchLabels: {app: authz-root-local}
  template:
    metadata:
      labels:
        app: authz-root-local
        authz-case: root-local
    spec:
      containers:
        - name: app
          image: registry.k8s.io/pause:3.10
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: authz-root-local
  namespace: omg-authz-root-local
spec:
  selector: {app: authz-root-local}
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
