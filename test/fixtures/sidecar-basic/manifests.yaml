apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: default
  namespace: istio-system
spec:
  mtls:
    mode: STRICT
---
apiVersion: v1
kind: Namespace
metadata:
  name: omg-strict
  labels:
    istio-injection: enabled
---
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: default
  namespace: omg-strict
spec:
  mtls:
    mode: STRICT
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: strict-api
  namespace: omg-strict
spec:
  replicas: 1
  selector:
    matchLabels: {app: strict-api}
  template:
    metadata:
      labels: {app: strict-api}
    spec:
      containers:
        - name: app
          image: registry.k8s.io/pause:3.10
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: strict-api
  namespace: omg-strict
spec:
  selector: {app: strict-api}
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
