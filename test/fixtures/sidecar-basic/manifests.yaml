---
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: default
  namespace: omg-dr-contradiction
spec:
  mtls:
    mode: STRICT
---
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: dr-api
  namespace: omg-dr-contradiction
spec:
  host: dr-api.omg-dr-contradiction.svc.cluster.local
  trafficPolicy:
    tls:
      mode: DISABLE
---
apiVersion: apps/v1
kind: Deployment
