  name: dr-api
  namespace: omg-dr-contradiction
spec:
  replicas: 1
  selector:
    matchLabels: {app: dr-api}
  template:
    metadata:
      labels: {app: dr-api}
    spec:
      containers:
        - name: app
          image: registry.k8s.io/pause:3.10
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: dr-api
  namespace: omg-dr-contradiction
spec:
  selector: {app: dr-api}
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
