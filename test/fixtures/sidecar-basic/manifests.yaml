  name: omg-unclassified
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: unclassified-api
  namespace: omg-unclassified
spec:
  replicas: 1
  selector:
    matchLabels: {app: unclassified-api}
  template:
    metadata:
      labels:
        app: unclassified-api
        sidecar.istio.io/inject: "true"
    spec:
      containers:
        - name: app
          image: registry.k8s.io/pause:3.10
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
---
