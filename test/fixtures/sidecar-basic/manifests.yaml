apiVersion: v1
kind: Namespace
metadata:
  name: omg-port-override
  labels:
    istio-injection: enabled
---
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: default
  namespace: omg-port-override
spec:
  mtls:
    mode: STRICT
---
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: port-override
  namespace: omg-port-override
spec:
  selector:
    matchLabels: {app: port-api}
  mtls:
    mode: STRICT
  portLevelMtls:
    "8080":
      mode: DISABLE
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: port-api
  namespace: omg-port-override
spec:
  replicas: 1
  selector:
    matchLabels: {app: port-api}
  template:
    metadata:
      labels: {app: port-api}
    spec:
      containers:
        - name: app
          image: registry.k8s.io/pause:3.10
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: port-api
  namespace: omg-port-override
spec:
  selector: {app: port-api}
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
