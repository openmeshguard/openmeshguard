apiVersion: v1
kind: Namespace
metadata:
  name: openmeshguard-e2e
---
# Fixture manager: ephemeral harness identity that creates test resources.
# It is intentionally distinct from both scanner identities under proof.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fixture-manager
  namespace: openmeshguard-e2e
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: openmeshguard-e2e-fixture-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: fixture-manager
    namespace: openmeshguard-e2e
---
# Scanner identities: never used to apply fixtures or RBAC.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: scanner-cluster
  namespace: openmeshguard-e2e
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: scanner-namespace
  namespace: openmeshguard-e2e
---
# Audit probe: intentionally has no RBAC binding. Its denied write attempt is
# the positive control proving the API server audit path is live.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: audit-probe
  namespace: openmeshguard-e2e
