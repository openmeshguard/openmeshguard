apiVersion: audit.k8s.io/v1
kind: Policy
omitStages:
  - RequestReceived
rules:
  # Scanner requests plus one unprivileged audit-positive-control identity.
  - level: Metadata
    users:
      - system:serviceaccount:openmeshguard-e2e:scanner-cluster
      - system:serviceaccount:openmeshguard-e2e:scanner-namespace
      - system:serviceaccount:openmeshguard-e2e:audit-probe
  - level: None
