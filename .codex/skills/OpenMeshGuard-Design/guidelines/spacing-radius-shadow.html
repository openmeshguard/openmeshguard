<!-- @dsCard group="Spacing" viewport="700x150" name="Radius & shadow" subtitle="Modest radii · subtle cool-tinted elevation" -->
<!doctype html><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<body style="margin:0;padding:20px;background:var(--surface-page);font-family:var(--font-mono);font-size:10.5px;color:var(--text-muted)">
  <div style="display:flex;gap:22px;align-items:center;flex-wrap:wrap">
    <div style="display:flex;gap:14px;align-items:flex-end">
      <div style="text-align:center"><div style="width:52px;height:38px;background:var(--brand-100);border:1px solid var(--brand-300);border-radius:var(--radius-sm)"></div><div style="margin-top:6px">sm 4</div></div>
      <div style="text-align:center"><div style="width:52px;height:38px;background:var(--brand-100);border:1px solid var(--brand-300);border-radius:var(--radius-md)"></div><div style="margin-top:6px">md 6</div></div>
      <div style="text-align:center"><div style="width:52px;height:38px;background:var(--brand-100);border:1px solid var(--brand-300);border-radius:var(--radius-lg)"></div><div style="margin-top:6px">lg 8</div></div>
      <div style="text-align:center"><div style="width:52px;height:38px;background:var(--brand-100);border:1px solid var(--brand-300);border-radius:var(--radius-xl)"></div><div style="margin-top:6px">xl 12</div></div>
      <div style="text-align:center"><div style="width:52px;height:24px;background:var(--brand-100);border:1px solid var(--brand-300);border-radius:var(--radius-pill)"></div><div style="margin-top:6px">pill</div></div>
    </div>
    <div style="width:1px;height:56px;background:var(--border-default)"></div>
    <div style="display:flex;gap:18px">
      <div style="text-align:center"><div style="width:52px;height:40px;background:#fff;border-radius:var(--radius-md);box-shadow:var(--shadow-xs)"></div><div style="margin-top:8px">xs</div></div>
      <div style="text-align:center"><div style="width:52px;height:40px;background:#fff;border-radius:var(--radius-md);box-shadow:var(--shadow-sm)"></div><div style="margin-top:8px">sm</div></div>
      <div style="text-align:center"><div style="width:52px;height:40px;background:#fff;border-radius:var(--radius-md);box-shadow:var(--shadow-md)"></div><div style="margin-top:8px">md</div></div>
      <div style="text-align:center"><div style="width:52px;height:40px;background:#fff;border-radius:var(--radius-md);box-shadow:var(--shadow-lg)"></div><div style="margin-top:8px">lg</div></div>
    </div>
  </div>
</body>
