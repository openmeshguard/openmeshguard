<!-- @dsCard group="Spacing" viewport="700x160" name="Spacing scale" subtitle="4px base grid — --space-1 … --space-12" -->
<!doctype html><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<body style="margin:0;padding:20px;background:var(--surface-card);font-family:var(--font-mono)">
  <div id="row" style="display:flex;align-items:flex-end;gap:14px"></div>
  <script>
    const sp=[['1','2'],['2','4'],['3','6'],['4','8'],['5','12'],['6','16'],['7','20'],['8','24'],['9','32'],['10','40'],['11','48'],['12','64']];
    document.getElementById('row').innerHTML=sp.map(([n,px])=>`
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
        <div style="width:var(--space-${n});height:var(--space-${n});background:var(--brand-500);border-radius:2px"></div>
        <div style="font-size:10px;color:var(--text-strong);font-weight:600">${n}</div>
        <div style="font-size:9.5px;color:var(--text-subtle)">${px}px</div>
      </div>`).join('');
  </script>
</body>
