<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<body style="margin:0;padding:20px;background:var(--surface-card)">
<div id="root"></div>
<script type="text/babel">
const { Button, IconButton } = window.OpenMeshGuardDesignSystem_65348c;
const Ico = ({d}) => <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{d}</svg>;
const Download = <Ico d={<g><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></g>}/>;
const Dots = <Ico d={<g><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></g>}/>;
function Demo(){
  return (
    <div style={{display:'flex',flexDirection:'column',gap:16}}>
      <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
        <Button variant="primary">Run scan</Button>
        <Button variant="secondary" leftIcon={Download}>Export evidence</Button>
        <Button variant="ghost">Cancel</Button>
        <Button variant="danger">Revoke exception</Button>
        <Button variant="primary" disabled>Disabled</Button>
      </div>
      <div style={{display:'flex',gap:10,alignItems:'center'}}>
        <Button size="sm" variant="secondary">Small</Button>
        <Button size="md" variant="secondary">Medium</Button>
        <Button size="lg" variant="secondary">Large</Button>
        <IconButton title="More"><span style={{display:'inline-flex'}}>{Dots}</span></IconButton>
        <IconButton title="Download" variant="primary"><span style={{display:'inline-flex'}}>{Download}</span></IconButton>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
