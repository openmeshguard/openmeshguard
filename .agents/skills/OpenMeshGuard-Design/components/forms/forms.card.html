<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body style="margin:0;padding:20px;background:var(--surface-card)">
<div id="root"></div>
<script type="text/babel">
const { Input, Select, Checkbox, Switch } = window.OpenMeshGuardDesignSystem_65348c;
function Demo(){
  const [c1,setC1]=React.useState(true);
  const [c2,setC2]=React.useState(false);
  const [sw,setSw]=React.useState(true);
  return (
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'16px 24px',alignItems:'start'}}>
      <Input label="Namespace" placeholder="e.g. payments" defaultValue="payments-api"/>
      <Select label="Cluster" options={[{value:'a',label:'prod-eu-1'},{value:'b',label:'prod-us-1'}]}/>
      <Input label="Owner" error="Owner is required"/>
      <Input label="Search resources" placeholder="Filter…" hint="Matches name, namespace, owner"/>
      <div style={{display:'flex',flexDirection:'column',gap:12,gridColumn:'1 / -1'}}>
        <Checkbox checked={c1} onChange={e=>setC1(e.target.checked)} label="Only critical findings"/>
        <Checkbox checked={c2} onChange={e=>setC2(e.target.checked)} label="Include muted findings"/>
        <Switch checked={sw} onChange={setSw} label="Continuous scanning"/>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
