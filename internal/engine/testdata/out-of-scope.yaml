apiVersion: openmeshguard.io/v1alpha1
kind: ControlPack
metadata:
  name: out-of-scope
  version: 1.0.0
controls:
  - id: ACME-MTLS-001
    title: Workload control using resource
    category: mtls
    severity: high
    evidenceType: config
    scope: workload
    requires: [mtls.effective]
    applicability: 'true'
    expression: 'resource.kind == "Gateway"'
    message: Out-of-scope variable.
    remediation:
      guidance: Use only workload-scope variables.
