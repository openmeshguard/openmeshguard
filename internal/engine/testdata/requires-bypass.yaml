apiVersion: openmeshguard.io/v1alpha1
kind: ControlPack
metadata:
  name: requires-bypass
  version: 1.0.0
controls:
  - id: ACME-MTLS-001
    title: Missing required dependency
    category: mtls
    severity: high
    evidenceType: config
    scope: workload
    requires: [mtls.effective]
    applicability: 'true'
    expression: 'workload.mtls.effective == "strict" && workload.mtls.clientTLSContradiction == false'
    message: Missing required dependency.
    remediation:
      guidance: Declare every expression dependency in requires.
