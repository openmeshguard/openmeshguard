apiVersion: openmeshguard.io/v1alpha1
kind: ControlPack
metadata:
  name: invalid-template-field
  version: 1.0.0
controls:
  - id: ACME-GOV-001
    title: Invalid message selector
    category: governance
    severity: medium
    evidenceType: context
    scope: workload
    requires: [workload.workload.name]
    applicability: 'true'
    expression: 'true'
    message: 'Workload {{ .Worklod }} failed.'
    remediation:
      guidance: Correct the message template.
