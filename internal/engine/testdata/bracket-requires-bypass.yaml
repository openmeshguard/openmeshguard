apiVersion: openmeshguard.io/v1alpha1
kind: ControlPack
metadata:
  name: bracket-requires-bypass
  version: 1.0.0
controls:
  - id: ACME-MTLS-001
    title: Bracket access cannot bypass requires
    category: mtls
    severity: high
    evidenceType: config
    scope: workload
    requires: [mtls.effective]
    applicability: 'true'
    expression: 'workload["mtls"]["clientTLSContradiction"] == false'
    message: Contradiction found.
    remediation:
      guidance: Correct the contradiction.
