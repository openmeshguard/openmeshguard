apiVersion: openmeshguard.io/v1alpha1
kind: ControlPack
metadata:
  name: malformed-id
  version: 1.0.0
controls:
  - id: bad-id
    title: Bad identifier
    category: mtls
    severity: high
    evidenceType: config
    scope: workload
    requires: [mtls.effective]
    applicability: 'true'
    expression: 'workload.mtls.effective == "strict"'
    message: Invalid identifier.
    remediation:
      guidance: Correct the identifier.
