apiVersion: openmeshguard.io/v1alpha1
kind: ControlPack
metadata:
  name: template-variable-unknown-field
  version: 1.0.0
controls:
  - id: ACME-GOV-001
    title: Template variable selectors must be valid
    category: governance
    severity: medium
    evidenceType: context
    scope: workload
    requires: [workload.workload.name]
    applicability: 'true'
    expression: 'false'
    message: '{{$p := (.Posture)}}{{$p.Mtlls.Effective}}'
    remediation:
      guidance: Correct the template selector.
