apiVersion: openmeshguard.io/v1alpha1
kind: ControlPack
metadata:
  name: cel-syntax
  version: 1.0.0
controls:
  - id: ACME-MTLS-001
    title: Invalid CEL syntax
    category: mtls
    severity: high
    evidenceType: config
    scope: workload
    requires: [mtls.effective]
    applicability: 'true'
    expression: 'workload.mtls.effective =='
    message: Invalid CEL syntax.
    remediation:
      guidance: Correct the expression.
