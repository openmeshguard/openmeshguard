apiVersion: openmeshguard.io/v1alpha1
kind: ControlPack
metadata:
  name: duplicate-builtin
  version: 1.0.0
controls:
  - id: MG-MTLS-001
    title: Duplicate a built-in identifier
    category: mtls
    severity: high
    evidenceType: config
    scope: workload
    requires: [mtls.effective]
    applicability: 'true'
    expression: 'workload.mtls.effective == "strict"'
    message: Duplicate built-in.
    remediation:
      guidance: Use a user-pack prefix.
