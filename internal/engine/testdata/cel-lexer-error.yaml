apiVersion: openmeshguard.io/v1alpha1
kind: ControlPack
metadata:
  name: cel-lexer-error
  version: 1.0.0
controls:
  - id: ACME-MTLS-001
    title: Lexer errors must not change CEL semantics
    category: mtls
    severity: high
    evidenceType: config
    scope: workload
    requires: [mtls.effective]
    applicability: 'true'
    expression: 'workload.mtls.effective @== "strict"'
    message: Invalid CEL was accepted.
    remediation:
      guidance: Correct the CEL expression.
